<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pocket Home</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe id="streamIframe"
            src="https://share.streampixel.io/69c913c10a480c4a161f3b93"
            allow="autoplay; microphone; clipboard-write">
    </iframe>

    <script>
        const iframe = document.getElementById('streamIframe');

        function sendDeviceInfo() {
            const ua = navigator.userAgent;
            const isPhone = /iPhone|Android.*Mobile/i.test(ua);
            const isTablet = /iPad|Android(?!.*Mobile)/i.test(ua)
                          || (navigator.maxTouchPoints > 1 && !/Windows/i.test(ua));
            const needsVirtualControls = isPhone || isTablet;

            // Format: no "message" key — custom fields go directly to UE5
            const payload = {
                deviceInfo: JSON.stringify({
                    type: "deviceInfo",
                    isMobile: needsVirtualControls,
                    isTablet: isTablet,
                    isPhone: isPhone
                })
            };

            iframe.contentWindow.postMessage(payload, 'https://share.streampixel.io');
            console.log('[DeviceDetection] Sent payload:', payload, 'UA:', ua);
            console.log('[DeviceDetection] isPhone:', isPhone, 'isTablet:', isTablet, 'needsVirtualControls:', needsVirtualControls);
        }

        // Log ALL messages from the iframe for debugging
        window.addEventListener('message', (event) => {
            console.log('[StreamMsg]', event.data);

            if (event.data.type === 'stream-state') {
                console.log('[StreamState]', event.data.value);

                if (event.data.value === 'loadingComplete') {
                    // Send immediately and retry after delays to ensure UE5 connection is ready
                    sendDeviceInfo();
                    setTimeout(sendDeviceInfo, 2000);
                    setTimeout(sendDeviceInfo, 5000);
                }
            }
        });
    </script>
</body>
</html>
